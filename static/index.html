<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCP EB</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --accent: #388bfd;
    --accent-hover: #58a6ff;
    --ai-bg: #1c2128;
    --user-bg: #0d419d;
    --danger: #f85149;
    --danger-hover: #ff7b72;
    --success: #3fb950;
    --warning: #e3b341;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 顶栏 ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    user-select: none;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent-hover); }
  .version { font-size: 12px; color: var(--text-muted); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.waiting   { background: var(--warning); box-shadow: 0 0 6px var(--warning); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .project-badge {
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px; max-width: 300px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── 消息列表 ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 92%;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .msg.ai   { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-label {
    font-size: 11px; color: var(--text-muted);
    margin-bottom: 4px; padding: 0 6px;
  }
  .msg.user .msg-label { text-align: right; }

  .msg-bubble {
    border-radius: 12px;
    padding: 14px 18px;
    line-height: 1.65;
    font-size: 14px;
    word-break: break-word;
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 2px;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border-top-right-radius: 2px;
  }

  /* Markdown 样式 */
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin: 0.8em 0 0.4em; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .msg-bubble h1 { font-size: 1.3em; }
  .msg-bubble h2 { font-size: 1.15em; }
  .msg-bubble h3 { font-size: 1em; }
  .msg-bubble p  { margin: 0.5em 0; }
  .msg-bubble ul,.msg-bubble ol { padding-left: 1.4em; margin: 0.5em 0; }
  .msg-bubble li { margin: 0.25em 0; }
  .msg-bubble code {
    background: #0d1117; border-radius: 4px;
    padding: 2px 6px; font-family: monospace; font-size: 0.9em;
  }
  .msg-bubble pre {
    background: #0d1117; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; overflow-x: auto;
    margin: 0.6em 0;
  }
  .msg-bubble pre code { background: none; padding: 0; }
  .msg-bubble table { border-collapse: collapse; margin: 0.6em 0; width: 100%; }
  .msg-bubble th,.msg-bubble td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
  .msg-bubble th { background: var(--surface2); }
  .msg-bubble blockquote {
    border-left: 3px solid var(--accent); margin: 0.6em 0;
    padding: 4px 12px; color: var(--text-muted);
  }
  .msg-bubble a { color: var(--accent-hover); }
  .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 0.8em 0; }

  /* ── 底部输入区 ── */
  #bottom {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #bottom-toolbar {
    display: flex; align-items: center; justify-content: space-between;
  }
  .msg-id-badge {
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px;
  }
  .toolbar-actions {
    display: flex; align-items: center; gap: 8px;
  }
  .toolbar-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 4px 14px;
    font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  .toolbar-btn:hover:not(:disabled) { background: var(--surface2); }
  .toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #interrupt-btn {
    background: transparent; border: 1px solid var(--danger);
    color: var(--danger); border-radius: 6px; padding: 4px 14px;
    font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  #interrupt-btn:hover { background: var(--danger); color: #fff; }
  #interrupt-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  #user-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text);
    font-size: 14px; resize: none; min-height: 42px; max-height: 160px;
    outline: none; transition: border-color 0.2s;
    font-family: inherit; line-height: 1.5;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-muted); }
  #user-input:disabled { opacity: 0.5; cursor: not-allowed; }

  #send-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 10px 20px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
    white-space: nowrap; height: 42px;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── 空状态 ── */
  #empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; color: var(--text-muted);
    gap: 12px; user-select: none;
  }
  #empty-state .icon { font-size: 48px; }
  #empty-state p { font-size: 14px; text-align: center; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo">MCP EB</span>
    <span class="version">v1.0.0</span>
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text" style="font-size:12px;color:var(--text-muted)">连接中…</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="project-badge" id="project-badge" title="">—</span>
  </div>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="icon">🤖</div>
    <p>等待 AI 发送消息…<br>请确保已在 VS Code 中启用 <code>mcp-eb</code> MCP 服务器</p>
  </div>
</div>

<div id="bottom">
  <div id="bottom-toolbar">
    <span class="msg-id-badge" id="msg-id-badge">消息 #0</span>
    <div class="toolbar-actions">
      <button class="toolbar-btn" id="clear-history-btn" onclick="clearHistory()">清空历史</button>
      <button id="interrupt-btn" onclick="sendInterrupt()">⛔ INTERRUPT</button>
    </div>
  </div>
  <div id="input-row">
    <textarea id="user-input" placeholder="输入回复… (Enter 发送，Shift+Enter 换行)" rows="1" disabled></textarea>
    <button id="send-btn" onclick="sendResponse()" disabled>发送</button>
  </div>
</div>

<script>
const API = '';
const HISTORY_PAGE_SIZE = 50;
let currentMsgId = 0;
let waitingForReply = false;
let latestPending = null;

// ── 自动调整 textarea 高度 ──
const textarea = document.getElementById('user-input');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendResponse();
  }
});

// ── 渲染 Markdown ──
function renderMarkdown(text) {
  try { return marked.parse(text); }
  catch { return text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── 添加消息到界面 ──
function appendMessage(type, content, msgId, project, ts) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.id = `msg-${msgId}-${type}`;

  const label = type === 'ai'
    ? `🤖 AI  #${msgId}  <span style="color:var(--text-muted)">${formatTime(ts)}</span>`
    : `👤 你  <span style="color:var(--text-muted)">${formatTime(ts)}</span>`;

  div.innerHTML = `
    <div class="msg-label">${label}</div>
    <div class="msg-bubble">${type === 'ai' ? renderMarkdown(content) : content.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function clearMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = `
    <div id="empty-state">
      <div class="icon">🤖</div>
      <p>等待 AI 发送消息…<br>请确保已在 VS Code 中启用 <code>mcp-eb</code> MCP 服务器</p>
    </div>
  `;
}

// ── 发送用户回复 ──
async function sendResponse() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || !waitingForReply) return;

  try {
    const resp = await fetch('/api/response', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({response: text, message_id: currentMsgId})
    });
    if (resp.ok) {
      appendMessage('user', text, currentMsgId, '', Date.now()/1000);
      input.value = '';
      input.style.height = 'auto';
      setInputEnabled(false);
      waitingForReply = false;
    }
  } catch(e) { console.error(e); }
}

// ── 发送中断信号 ──
async function sendInterrupt() {
  if (!confirm('确认发送 INTERRUPT 信号给 AI？')) return;
  try {
    await fetch('/api/interrupt', {method:'POST'});
    document.getElementById('interrupt-btn').disabled = true;
    setInputEnabled(false);
    waitingForReply = false;
    appendMessage('user', '⛔ INTERRUPT 信号已发送', currentMsgId, '', Date.now()/1000);
  } catch(e) { console.error(e); }
}

async function clearHistory() {
  if (!confirm('确认清空历史消息？这不会重置当前会话状态。')) return;

  const button = document.getElementById('clear-history-btn');
  button.disabled = true;

  try {
    const resp = await fetch('/api/clear-history', {method:'POST'});
    if (!resp.ok) throw new Error('clear failed');

    clearMessages();

    if (waitingForReply && latestPending) {
      appendMessage('ai', latestPending.summary || '', latestPending.id, latestPending.project, Date.now() / 1000);
      document.getElementById('msg-id-badge').textContent = `消息 #${latestPending.id}`;
    }
  } catch(e) {
    console.error(e);
    alert('清空历史失败，请稍后重试。');
  } finally {
    button.disabled = false;
  }
}

// ── 启用/禁用输入 ──
function setInputEnabled(enabled) {
  document.getElementById('user-input').disabled = !enabled;
  document.getElementById('send-btn').disabled = !enabled;
  if (enabled) document.getElementById('user-input').focus();
}

// ── 状态指示 ──
function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot';
  if (state === 'connected') {
    dot.classList.add('connected');
    txt.textContent = '已连接';
  } else if (state === 'waiting') {
    dot.classList.add('waiting');
    txt.textContent = '等待 AI 消息…';
  } else {
    txt.textContent = '连接中断，重试中…';
  }
}

// ── 轮询最新状态 ──
let knownMsgId = 0;

async function poll() {
  try {
    const r = await fetch('/api/current');
    if (!r.ok) throw new Error('bad status');
    const data = await r.json();

    latestPending = {
      id: data.pending_id,
      summary: data.pending_summary,
      project: data.pending_project,
    };

    setStatus('connected');

    if (data.pending_id > knownMsgId) {
      knownMsgId = data.pending_id;
      currentMsgId = data.pending_id;
      appendMessage('ai', data.pending_summary || '', data.pending_id, data.pending_project, Date.now()/1000);

      document.getElementById('project-badge').textContent = data.pending_project || '.';
      document.getElementById('project-badge').title = data.pending_project || '.';
      document.getElementById('msg-id-badge').textContent = `消息 #${data.pending_id}`;
      document.getElementById('interrupt-btn').disabled = false;

      waitingForReply = true;
      setInputEnabled(true);
      setStatus('waiting');
    }
  } catch(e) {
    setStatus('error');
  }
}

// 启动时加载历史
async function loadHistory() {
  try {
    clearMessages();

    const r = await fetch(`/api/history?limit=${HISTORY_PAGE_SIZE}`);
    if (!r.ok) return;
    const data = await r.json();
    for (const item of data.history) {
      if (item.id > knownMsgId && item.type === 'ai') knownMsgId = item.id;
      appendMessage(item.type, item.content, item.id || 0, item.project_directory || '.', item.timestamp);
    }
    if (knownMsgId > 0) currentMsgId = knownMsgId;
  } catch(e) {}
}

loadHistory().then(() => {
  setInterval(poll, 600);
});
</script>
</body>
</html>
